name: Build SidraWallet APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Workflow Version Check
        run: echo "WORKFLOW VERSION 2026-06-06"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Buat Keystore Tetap
        run: |
          keytool -genkey -v \
            -keystore app/sidra.keystore \
            -alias sidrakey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sidra123456 \
            -keypass sidra123456 \
            -dname "CN=SidraWallet,O=Sidra,C=ID"

      - name: Grant gradlew Permission
        run: chmod +x ./gradlew

      - name: Verify Gradle
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info --warning-mode all

      - name: Verify APK Exists
        run: ls -lah app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SidraWallet-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
