name: Build SidraWallet APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Workflow Version Check
        run: echo "WORKFLOW VERSION 2026-07-13"
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/sidrawallet.jks
      - name: Grant gradlew Permission
        run: chmod +x ./gradlew
      - name: Verify Gradle
        run: ./gradlew --version
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --info --warning-mode all
      - name: Verify APK Exists
        run: ls -lah app/build/outputs/apk/release/
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SidraWallet-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SidraWallet v${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
